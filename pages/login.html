<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - DocBook</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<div class="form-container" style="margin-top: 100px;">
    <h2>Welcome Back</h2>
    <form id="loginForm" action="../php/auth/login.php" method="POST">
        
        <div class="form-group">
            <label>Username or Email</label>
            <input type="text" name="identity" placeholder="Enter username or email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>

        <button type="submit" class="btn-submit">Login</button>
        
        <p style="text-align:center; margin-top:15px;">
            Don't have an account? <a href="register.html" style="color:#1a73e8;">Register</a>
        </p>
    </form>
</div>

</body>
</html>
