<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DocBook</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="background:#f0f4f8; padding: 40px 20px;">

<div class="form-container" id="login-box">

    <div style="text-align:center; margin-bottom:20px;">
        <i class="bi bi-hospital" 
        style="font-size:48px; color:#1a73e8;"></i>
        <h2 style="margin-top:10px;">Welcome Back!</h2>
        <p style="font-size:14px; color:#6c757d;">
        Login to your DocBook account</p>
    </div>

    <!-- Alert Box -->
    <div id="alert-box"></div>

    <form id="loginForm">

        <!-- Username or Email -->
        <div class="form-group">
            <label>
                <i class="bi bi-person"></i> Username or Email
            </label>
            <input type="text" id="username" name="username" 
            placeholder="Enter username or email" required>
        </div>

        <!-- Password -->
        <div class="form-group">
            <label>
                <i class="bi bi-lock"></i> Password
            </label>
            <div style="position:relative;">
                <input type="password" id="password" 
                name="password" placeholder="Enter password" required>
                <i class="bi bi-eye" id="toggle-password"
                style="position:absolute; right:12px; top:50%; 
                transform:translateY(-50%); cursor:pointer; 
                color:#6c757d; font-size:16px;"></i>
            </div>
        </div>

        <!-- Remember Me -->
        <div style="display:flex; align-items:center; 
        justify-content:space-between; margin-bottom:16px;">
            <label style="display:flex; align-items:center; 
            gap:6px; font-size:13px; cursor:pointer;">
                <input type="checkbox" id="remember" name="remember">
                Remember me
            </label>
            <a href="#" style="font-size:13px; color:#1a73e8;">
            Forgot password?</a>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">
            <span id="btn-text">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </span>
        </button>

        <p style="text-align:center; margin-top:16px; font-size:14px;">
            Don't have an account? 
            <a href="register.html" 
            style="color:#1a73e8; font-weight:600;">
            Register here</a>
        </p>

    </form>
</div>

<script>
// ================================
// GSAP Animation
// ================================
gsap.from("#login-box", {
    duration: 0.8,
    y: 50,
    opacity: 0,
    ease: "power3.out"
});

// ================================
// Toggle Password Visibility
// ================================
document.getElementById('toggle-password')
.addEventListener('click', function() {
    const passInput = document.getElementById('password');
    if (passInput.type === 'password') {
        passInput.type = 'text';
        this.className = 'bi bi-eye-slash';
    } else {
        passInput.type = 'password';
        this.className = 'bi bi-eye';
    }
});

// ================================
// Form Submit
// ================================
document.getElementById('loginForm')
.addEventListener('submit', function(e) {
    e.preventDefault();

    const btn    = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    btnText.innerHTML = '<span class="spinner"></span> Logging in...';
    btn.disabled = true;

    const formData = new FormData(this);

    fetch('../php/auth/login.php', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        const alertBox = document.getElementById('alert-box');

        if (data.status === 'success') {
            alertBox.innerHTML = 
            `<div class="alert success">
                ✅ Login successful! Redirecting...
            </div>`;

            // Role অনুযায়ী redirect
            setTimeout(() => {
                if (data.role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else if (data.role === 'doctor') {
                    window.location.href = 'doctor-dashboard.html';
                } else {
                    window.location.href = 'patient-dashboard.html';
                }
            }, 1000);

        } else {
            alertBox.innerHTML = 
            `<div class="alert error">❌ ${data.message}</div>`;
            
            gsap.from("#alert-box", {
                duration: 0.3,
                x: -10,
                ease: "power2.out"
            });

            btnText.innerHTML = 
            '<i class="bi bi-box-arrow-in-right"></i> Login';
            btn.disabled = false;
        }
    })
    .catch(err => {
        console.log(err);
        btnText.innerHTML = 
        '<i class="bi bi-box-arrow-in-right"></i> Login';
        btn.disabled = false;
    });
});
</script>

</body>
</html>
