<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - DocBook</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- Flatpickr (Datepicker) CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>

<div class="form-container">
    <h2>Create Account</h2>
    <form id="registerForm" action="../php/auth/register-process.php" method="POST">
        
        <!-- Role Selection (Feature 6: Dropdown) -->
        <div class="form-group">
            <label>I am a:</label>
            <select name="role" id="role" required>
                <option value="patient">Patient</option>
                <option value="doctor">Doctor</option>
            </select>
        </div>

        <!-- Username (Feature 4: Realtime Check) -->
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" id="username" placeholder="Choose a unique username" required>
            <small id="user-status" class="validation-msg"></small>
        </div>

        <div class="form-row">
            <!-- Email (Feature 5: Verification) -->
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" id="email" required>
            </div>
            <!-- Phone (Feature 5: Verification) -->
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" id="phone" required>
            </div>
        </div>

        <div class="form-row">
            <!-- Datepicker (Feature 14) -->
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="text" name="dob" id="dob" placeholder="Select Date" required>
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select name="gender" required>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit" class="btn-submit">Register Now</button>
        <p style="text-align:center; margin-top:15px;">Already have an account? <a href="login.html" style="color:#1a73e8;">Login</a></p>
    </form>
</div>

<!-- JS Scripts -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    // 1. Datepicker Initialize
    flatpickr("#dob", { dateFormat: "Y-m-d" });

    // 2. Real-time Username Check (Feature #4)
    const usernameInput = document.getElementById('username');
    const userStatus = document.getElementById('user-status');

    usernameInput.addEventListener('keyup', function() {
        let username = this.value;
        if(username.length > 2) {
            fetch(`../php/auth/check-username.php?username=${username}`)
                .then(res => res.json())
                .then(data => {
                    if(data.exists) {
                        userStatus.textContent = "Username already taken!";
                        userStatus.style.color = "red";
                        usernameInput.classList.add('invalid');
                    } else {
                        userStatus.textContent = "Username available!";
                        userStatus.style.color = "green";
                        usernameInput.classList.remove('invalid');
                    }
                });
        }
    });
</script>
</body>
</html>
